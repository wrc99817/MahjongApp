<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雀账 Web Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-game" viewBox="0 0 24 24">
        <path d="M5 7.25A2.25 2.25 0 0 1 7.25 5h9.5A2.25 2.25 0 0 1 19 7.25v9.5A2.25 2.25 0 0 1 16.75 19h-9.5A2.25 2.25 0 0 1 5 16.75v-9.5Z" />
        <path d="M8.5 9.25h7M8.5 12h7M8.5 14.75h4.5" />
      </symbol>
      <symbol id="icon-stats" viewBox="0 0 24 24">
        <path d="M4.5 18.5h15" />
        <path d="M6.5 15.5v-5M12 15.5v-9M17.5 15.5v-7" />
      </symbol>
      <symbol id="icon-friends" viewBox="0 0 24 24">
        <path d="M9.5 11.25a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5Z" />
        <path d="M3.75 19.25c.55-3.05 2.58-5 5.75-5s5.2 1.95 5.75 5" />
        <path d="M16.25 11.5a2.75 2.75 0 1 0 0-5.5" />
        <path d="M16.75 14.5c2.08.36 3.33 1.95 3.75 4.5" />
      </symbol>
      <symbol id="icon-mine" viewBox="0 0 24 24">
        <path d="M12 12.25a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z" />
        <path d="M5.25 19.25c.72-3.25 3.05-5 6.75-5s6.03 1.75 6.75 5" />
      </symbol>
      <symbol id="icon-add" viewBox="0 0 24 24">
        <path d="M12 5.5v13M5.5 12h13" />
      </symbol>
      <symbol id="icon-back" viewBox="0 0 24 24">
        <path d="M14.5 6.5 9 12l5.5 5.5" />
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M4.5 7h15M9 7V5.75A1.75 1.75 0 0 1 10.75 4h2.5A1.75 1.75 0 0 1 15 5.75V7M8 10v8M12 10v8M16 10v8" />
        <path d="M6.5 7 7.2 20h9.6l.7-13" />
      </symbol>
    </svg>

    <main class="demo-shell">
      <aside class="demo-sidebar" aria-label="原型说明和流程控制">
        <div>
          <p class="eyebrow">HarmonyOS NEXT / ArkUI 对齐原型</p>
          <h1>雀账 Web Demo</h1>
          <p>把当前 App 的离线记账闭环做成可点、可录、可封账的 Web 预览。数据只保存在浏览器内存中，刷新后会恢复为默认演示状态。</p>
        </div>

        <section class="sidebar-card">
          <h2>可验收流程</h2>
          <ol>
            <li>从空牌局创建一场离线牌局</li>
            <li>录入单家收分、AA 开销、手动调整</li>
            <li>筛选或撤回进行中流水</li>
            <li>进入结算、封账，再回到空牌局</li>
            <li>查看统计、历史详情、牌友和我的页</li>
          </ol>
        </section>

        <section class="sidebar-card">
          <h2>快速跳转</h2>
          <div class="quick-actions">
            <button data-action="seed-active">载入进行中牌局</button>
            <button data-action="seed-history">载入封账历史</button>
            <button data-action="reset-demo">重置演示数据</button>
          </div>
        </section>

        <section class="sidebar-card muted-card">
          <h2>对齐说明</h2>
          <p>视觉保留轻玻璃导航、柔白卡片、金额语义色、Sheet 编辑形态和短按压反馈。功能范围按当前 App 状态，不提前加入登录、云同步、导出和主题切换。</p>
        </section>
      </aside>

      <section class="phone" aria-label="雀账手机交互预览">
        <div id="app" class="phone-stage"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
